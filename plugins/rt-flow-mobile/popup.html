<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RT Flow Mobile</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-width: 320px; width: 360px; max-width: 100vw;
      font: 14px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1e; color: #ddd;
    }
    header { padding: 10px 12px; background: #252526; border-bottom: 1px solid #333; }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    header .sub { font-size: 11px; color: #888; margin-top: 2px; }
    .bar { display: flex; gap: 6px; padding: 8px 12px; flex-wrap: wrap; }
    button {
      font: inherit; padding: 8px 10px; min-height: 36px;
      background: #0e639c; color: #fff; border: 0; border-radius: 6px; cursor: pointer;
    }
    button.sec { background: #3a3d41; }
    button:active { opacity: .8; }
    .list { padding: 4px 8px 12px; }
    .acct {
      display: flex; align-items: center; gap: 8px; padding: 8px;
      border: 1px solid #333; border-radius: 8px; margin: 6px 0; background: #252526;
    }
    .acct.active { border-color: #2ea44f; background: #1d2b20; }
    .acct .main { flex: 1; min-width: 0; }
    .acct .email { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .acct .meta { font-size: 11px; color: #9aa; margin-top: 2px; }
    .bal { font-variant-numeric: tabular-nums; }
    .bal.low { color: #e5534b; }
    .bal.ok { color: #3fb950; }
    .pill { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: #3a3d41; color: #ccc; }
    .pill.lock { background: #5a3a00; color: #ffcf6b; }
    .pill.exh { background: #5a1f1f; color: #ff9b9b; }
    .acts { display: flex; flex-direction: column; gap: 4px; }
    .acts button { padding: 5px 8px; min-height: 28px; font-size: 12px; }
    textarea {
      width: 100%; height: 64px; background: #1a1a1a; color: #ddd;
      border: 1px solid #333; border-radius: 6px; padding: 6px; font: 12px monospace; resize: vertical;
    }
    .addbox { padding: 0 12px 8px; display: none; }
    .addbox.show { display: block; }
    .empty { color: #888; text-align: center; padding: 24px 12px; font-size: 13px; }
    .foot { padding: 6px 12px 12px; font-size: 11px; color: #666; }
  </style>
</head>
<body>
  <header>
    <h1>RT Flow Mobile · 道法自然</h1>
    <div class="sub" id="sub">用户无为 · 插件无不为</div>
  </header>
  <div class="bar">
    <button id="btnAdd">＋ 添加账号</button>
    <button id="btnVerify" class="sec">↻ 验证全部</button>
    <button id="btnNext" class="sec">⤳ 切下一号</button>
  </div>
  <div class="addbox" id="addbox">
    <textarea id="ta" placeholder="每行一个账号：email password&#10;支持任意格式粘贴"></textarea>
    <div class="bar" style="padding-left:0;padding-right:0">
      <button id="btnSave">保存</button>
      <button id="btnCancel" class="sec">取消</button>
    </div>
  </div>
  <div class="list" id="list"><div class="empty">加载中…</div></div>
  <div class="foot">余额 ≤ 停止阈值即自动切走 · 当前号绿框</div>
  <script src="core/score.js"></script>
  <script src="core/store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
